title: PIC32CK_SG_GC RTC clock

description: |
  RTC clock configuration.

include: [base.yaml]

compatible: "microchip,pic32ck-sg-gc-rtc"

properties:
  "#clock-cells":
    type: int
    const: 1
    description: |
      clock subsystem

  rtc-src:
    type: int
    default: 0
    description: |
      RTC source clock selection
      0: ulp1k
      1: ulp32k
      4: xosc1k
      5: xosc32k

clock-cells:
  - subsystem
