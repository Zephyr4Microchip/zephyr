title: Microchip MSPI G1 QSPI driver

description: |
    Microchip MSPI driver bindings.

    Group g1 MSPI driver supports following hardware peripherals:
    - name="QSPI" id="U2008" version="1.6.3"

compatible: "microchip,qspi-g1-mspi"

include:
  - base.yaml
  - pinctrl-device.yaml
  - mspi-controller.yaml

properties:
  reg:
    type: array
    required: true

  interrupts:
    type: array
    required: true

  clocks:
    type: phandle-array
    required: true
    description: APB, AHB, and AHB2X in that order.

  clock-names:
    type: string-array
    required: true
    enum: ["apb", "ahb", "ahb2x"]

  software-multiperipheral:
    type: boolean
    description: Use software-controlled chip selects for multiple peripherals.
